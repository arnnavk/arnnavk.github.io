<!DOCTYPE html>
<html lang="en">

<body>

  <script>
    window.onscroll = function() {scrollFunction()};

    function scrollFunction() {
  if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
    document.getElementById("jump").style.backgroundColor = "#282828";
  } else {
    document.getElementById("jump").style.backgroundColor = "#161414";
  }
}

var image_tracker = '1';

function change(){
  var image = document.getElementById('circle');
  if(image_tracker=='1')
  {
    image.src='2.png';
    image_tracker='2';
  }

  else if(image_tracker=='2')

    image.src='3.png';

  }

  else if(image_tracker=='3')
  {
    image.src='4.png';

  }

  else if(image_tracker=='4')

  }

  else if(image_tracker=='5')
  {

  }

  }

  }

  else if(image_tracker=='15')

    image.src='16.png';
    image_tracker='16';
  }

  else if(image_tracker=='16')
  {
    image.src='17.png';
    image_tracker='17';
  }

  else if(image_tracker=='17')
  {
    image.src='1.png';
    image_tracker='1';
  }
  
}

var timer = setInterval('change();', 1000);
  </script>

  <style>
    html {
      scroll-behavior: smooth;
    }
      body {
        background-color: #F5F5F5;
        font-family: myFont;
        overflow-x:hidden;
      }
      .wrapper {
        background-color: #161414;
        width: 100%;
        height: auto;
      }
      .container {
        width: 100%;
        background-color: #161414;
        padding-bottom: 60px;
      }
    .jumbotron {
      width: 100%;
      background-color: #161414;
      position: sticky; 
      position: -webkit-sticky;
      top: 0;
      z-index: 9;
      transition: 0.5s;
      color:black;
      overflow: hidden;
      padding: 2%;
    }
     .jumbotron #menu {
       display: none;
     }
     .jumbotron #item1 {
      padding: 40px;
      text-transform: uppercase;
      float:right;
      font-family: MyFont2;
     }
     .jumbotron #item2 {
      padding: 54px;
      font-family: MyFont2;
      float: right;
      text-decoration: none;
      text-transform: uppercase;
     }
     .jumbotron .active {
      color:rgb(0, 184, 153);
     }

     .button1 {
      padding: 14px;
      border: none;
      outline: none;
      border-radius: 10px;
      background-color: rgb(0, 184, 153);
      color: rgb(255, 255, 255);
      cursor: pointer;
      letter-spacing: 0.45px;
      text-transform: uppercase;
    }

    .image {
      width: 200px;
      max-width: 200px;
      left: 0;
      right: 0;
      margin: auto;
      }
      .text {
      width: 800px;
      max-width: 800px;
      left: 0;
      right: 0;
      margin: auto;
      text-align:center;
      }

      @media screen and (max-width: 500px) {
        .text {
          width: auto;
          left: 0;
          right: 0;
          margin: auto;
          text-align:center;
          }
      }

    @media screen and (max-width: 1100px) {
      .text {
        width: 800px;
        max-width: 800px;
        left: 0;
        right: 0;
        margin: auto;
        text-align:center;
        }
      .jumbotron {
        padding: 0%;
      }
      .jumbotron #logo {
        float: left;
      }
      .jumbotron #menu {
        display: block;
        cursor: pointer;
        padding-right: 2%;
        float: right;
      }
      .jumbotron #item1, #item2 {
        display: none;
      }
    }
    @font-face {
      font-family: MyFont;
      src: url(fonts/Gilroy-Medium.ttf);
    }
  
    @font-face {
      font-family: MyFont2;
      src: url(fonts/Montserrat-SemiBold.ttf);
    } 
  </style>
  <div class="wrapper">

    <a href="#" id ="item1"><button type="button" class="button1"><b>Join the waitlist</b></button></a>

  <div class="container">

      <h3 style="color: white;">The ones who are crazy enough to think they can change the world, are the ones who do&#8228; - Steve Jobs&#8228;</h3>
    </div>
</div>
</div>
